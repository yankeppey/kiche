# Build + test on every push to main and on pull requests. No publishing —
# releases are tag-triggered (see release.yml, release-libquiche.yml).
#
# The macOS job builds libquiche locally, publishes it to mavenLocal, then runs
# :kiche tests + compiles the iOS and Android targets against that locally-
# published libquiche. The desktop-natives job proves the Linux/Windows JNI
# pipeline still builds end-to-end.
name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Install Rust + cross targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,x86_64-apple-darwin,
            aarch64-apple-ios,aarch64-apple-ios-sim,
            aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/quiche

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK
        run: echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.3.13750724"

      # Publish libquiche to mavenLocal so :kiche's compile and test steps can
      # resolve `eu.buney.libquiche:libquiche` like any other Maven dependency.
      # This is the cheap stand-in for a Central release in PR validation.
      - name: Publish libquiche to mavenLocal
        run: >-
          ./gradlew
          :libquiche:publishToMavenLocal
          :libquiche-headers:publishToMavenLocal
          --no-configuration-cache

      - name: JVM tests
        run: ./gradlew jvmTest --no-configuration-cache

      # The metadata (klib) compile of the shared iosMain source set is what
      # `publishToMavenCentral` builds — it catches errors the per-target iOS
      # compiles miss (e.g. non-exhaustive `when` over commonized expect enums).
      - name: Compile iOS targets + Kotlin metadata
        run: >-
          ./gradlew
          compileKotlinIosArm64 compileKotlinIosSimulatorArm64
          compileIosMainKotlinMetadata
          --no-configuration-cache

      - name: Compile Android (release AAR)
        run: ./gradlew :kiche:assembleRelease --no-configuration-cache

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jvm-test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
          if-no-files-found: ignore

  desktop-natives:
    name: Desktop natives
    uses: ./.github/workflows/desktop-natives.yml
