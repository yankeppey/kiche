# Tag-triggered release to Maven Central. Push a version tag (e.g. v0.1.0-alpha.1)
# to publish. The tag must match `kiche` in gradle/libs.versions.toml — the
# library version is the single source of truth and the tag has to track it
# (logic ported from media.net's Jenkinsfiles).
#
# The deployment lands VALIDATED on https://central.sonatype.com/publishing/deployments;
# promote it to PUBLISHED manually once you're happy with it.
#
# Required repository secrets (same names/values as the Kopus project — same
# eu.buney namespace, Sonatype account and signing key):
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
#   SIGNING_KEY (ASCII-armored private key), SIGNING_KEY_ID, SIGNING_KEY_PASSWORD
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  # Linux/Windows .so/.dll, retained long enough for the publish job to fetch.
  desktop-natives:
    name: Desktop natives
    uses: ./.github/workflows/desktop-natives.yml
    with:
      retention-days: 7

  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    needs: [desktop-natives]
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # media.net-style guard: refuse to publish if the tag and the build
      # version disagree, so a v0.1.0 tag can never ship a 0.1.1 build.
      - name: Verify tag matches libs.versions.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BUILD_VERSION=$(awk -F'"' '/^kiche[[:space:]]*=/{print $2; exit}' gradle/libs.versions.toml)
          if [ "$TAG_VERSION" != "$BUILD_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME (parsed as $TAG_VERSION) does not match kiche=$BUILD_VERSION in gradle/libs.versions.toml"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches kiche=$BUILD_VERSION; proceeding."

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Install Rust + cross targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,x86_64-apple-darwin,
            aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim,
            aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/quiche

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install Android NDK
        run: echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.3.13750724"

      - name: Download Linux/Windows natives
        uses: actions/download-artifact@v8
        with:
          path: desktop-natives
          pattern: desktop-native-*
          merge-multiple: true

      - name: Build Apple + macOS JNI natives
        run: |
          bash scripts/build_quiche_apple.sh
          bash scripts/build_quiche_jni.sh

      # publishToMavenCentral (not publishAndRelease...) so the deployment is
      # VALIDATED and we promote it manually. All five modules go up in one
      # Gradle invocation -> a single Central deployment. Android natives build
      # via cargo-ndk during the AAR assembly; macOS/iOS natives are reused from
      # the step above (ci.skip.native.build); Linux/Windows are injected from
      # the downloaded artifacts via kiche.desktopNativesDir.
      - name: Publish to Maven Central (VALIDATED)
        run: >-
          ./gradlew
          :kiche:publishToMavenCentral
          :ktor-kiche-webtransport:publishToMavenCentral
          :ktor-client-kiche:publishToMavenCentral
          :ktor-server-kiche:publishToMavenCentral
          :ktor-client-h3-adaptive:publishToMavenCentral
          -Pci.skip.native.build
          -Pkiche.desktopNativesDir=${{ github.workspace }}/desktop-natives
          --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
