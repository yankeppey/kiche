# Tag-triggered :kiche release to Maven Central. Push a version tag (e.g.
# v0.1.0-alpha.1) to publish. The tag must match `kiche` in
# gradle/libs.versions.toml (logic ported from media.net's Jenkinsfiles).
#
# Prerequisite: the `libquiche` version pinned in libs.versions.toml must
# already be PUBLISHED on Maven Central (via release-libquiche.yml). This job
# resolves libquiche transitively and packages :kiche on top of it.
#
# The deployment lands VALIDATED on https://central.sonatype.com/publishing/deployments;
# promote to PUBLISHED manually once you're happy with it.
#
# Required repository secrets:
#   MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD,
#   SIGNING_KEY (ASCII-armored private key), SIGNING_KEY_ID, SIGNING_KEY_PASSWORD
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  # Linux/Windows libquiche_jni.{so,dll}, retained long enough for the publish job to fetch.
  desktop-natives:
    name: Desktop natives
    uses: ./.github/workflows/desktop-natives.yml
    with:
      retention-days: 7

  publish:
    name: Publish to Maven Central
    runs-on: macos-latest
    needs: [desktop-natives]
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
        # Submodule checkout no longer required — :kiche doesn't touch
        # third_party/quiche directly; libquiche binaries come from Maven Central.

      - name: Verify tag matches libs.versions.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BUILD_VERSION=$(awk -F'"' '/^kiche[[:space:]]*=/{print $2; exit}' gradle/libs.versions.toml)
          if [ "$TAG_VERSION" != "$BUILD_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME (parsed as $TAG_VERSION) does not match kiche=$BUILD_VERSION in gradle/libs.versions.toml"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches kiche=$BUILD_VERSION; proceeding."

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      # Android NDK is still required: AGP externalNativeBuild compiles
      # libquiche_jni.so for the Android target. The NDK ships its own clang,
      # so no separate host C toolchain install is needed for Android.
      - name: Install Android NDK
        run: echo "y" | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.3.13750724"

      - name: Download Linux/Windows kiche_jni natives
        uses: actions/download-artifact@v8
        with:
          path: desktop-natives
          pattern: desktop-native-*
          merge-multiple: true

      # Gradle resolves eu.buney.libquiche:libquiche from Maven Central, runs
      # the extract tasks, then compiles libquiche_jni for macOS host + Android
      # via its own task wiring (buildJniMacos + AGP externalNativeBuild).
      # Linux/Windows kiche_jni libs come from -Pkiche.desktopNativesDir.
      - name: Publish to Maven Central (VALIDATED)
        run: >-
          ./gradlew
          :kiche:publishToMavenCentral
          :ktor-kiche-webtransport:publishToMavenCentral
          :ktor-client-kiche:publishToMavenCentral
          :ktor-server-kiche:publishToMavenCentral
          :ktor-client-h3-adaptive:publishToMavenCentral
          -Pkiche.desktopNativesDir=${{ github.workspace }}/desktop-natives
          --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
