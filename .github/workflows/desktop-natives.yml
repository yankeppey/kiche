# Reusable workflow: build the desktop-JVM JNI natives that can't be produced on
# macOS — Linux (.so) and Windows (.dll). Each OS builds natively on its own
# runner (quiche = Rust + vendored BoringSSL cross-compiles poorly).
#
# Two stages per runner:
#   1. cargo: build libquiche.{a,so,dll,dll.lib}
#   2. cmake: build libquiche_jni.{so,dll}, dynamically linked against libquiche
#
# Uploads `desktop-native-<OS>` artifact laid out as <os>/<arch>/libquiche_jni.{so,dll}.
# Called by both ci.yml (validation) and release.yml (consumed by the JVM jar).
name: Desktop natives

on:
  workflow_call:
    inputs:
      retention-days:
        description: How long to keep the uploaded native artifacts.
        type: number
        required: false
        default: 1

jobs:
  build:
    name: Desktop native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # ilammy/setup-nasm has no Node 24 release yet; force its JS onto Node 24 now
    # (GitHub forces this for every action from 2026-06-02 anyway). Drop this once
    # setup-nasm ships a Node 24 release.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/quiche

      - name: Install NASM (Windows — required by BoringSSL)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Build Linux libquiche
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/build_libquiche_linux.sh x86_64

      - name: Build Linux JNI
        if: runner.os == 'Linux'
        shell: bash
        env:
          LIBQUICHE_JVM_NATIVE_ROOT: ${{ github.workspace }}/build/quiche/linux
          QUICHE_INCLUDE_DIR: ${{ github.workspace }}/build/quiche/linux/x86_64/include
        run: bash scripts/build_quiche_jni_linux.sh x86_64

      - name: Build Windows libquiche
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build_libquiche_windows.ps1 x86_64

      - name: Build Windows JNI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          LIBQUICHE_JVM_NATIVE_ROOT: ${{ github.workspace }}/build/quiche/windows
          QUICHE_INCLUDE_DIR: ${{ github.workspace }}/build/quiche/windows/x86_64/include
        run: |
          # The Windows JNI script expects libquiche.dll + libquiche.dll.lib in
          # <root>/<arch>/. Mirror the layout `build_libquiche_windows.ps1` writes.
          ./scripts/build_quiche_jni_windows.ps1 x86_64

      - name: Stage native artifact
        shell: bash
        run: |
          mkdir -p staged
          if [ "$RUNNER_OS" = "Linux" ]; then
            mkdir -p staged/linux/x86_64
            cp build/buildJniLinux/x86_64/libquiche_jni.so staged/linux/x86_64/
          else
            mkdir -p staged/windows/x86_64
            cp build/buildJniWindows/x86_64/libquiche_jni.dll staged/windows/x86_64/
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: desktop-native-${{ runner.os }}
          path: staged/
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error
