# XcodeGen config for the Kiche iOS example.
#
# The iosApp.xcodeproj is GENERATED from this file — run `xcodegen generate` here, then open
# iosApp.xcodeproj in Xcode. The .xcodeproj is gitignored; this project.yml is the source of truth.
#
# The app hosts the shared Compose UI (:example:shared) as a static "ComposeApp" framework, built
# and embedded by the Gradle `embedAndSignAppleFrameworkForXcode` task in the pre-build script.

name: iosApp

options:
  bundleIdPrefix: eu.buney.kiche.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    # The Gradle embed task writes the framework into the build dir, which Xcode's default
    # run-script sandbox forbids. KMP requires this to be disabled.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      base:
        PRODUCT_NAME: KicheExample
        PRODUCT_BUNDLE_IDENTIFIER: eu.buney.kiche.example
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: iosApp/Info.plist
        # The shared "ComposeApp" framework is produced by the Gradle pre-build script below.
        # Swift autolinking picks it up from this search path — no explicit -framework needed.
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
    preBuildScripts:
      - name: "Build & embed Kiche shared framework (Gradle)"
        basedOnDependencyAnalysis: false
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build (OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES)"
            exit 0
          fi
          cd "$SRCROOT/../.."
          ./gradlew :example:shared:embedAndSignAppleFrameworkForXcode
